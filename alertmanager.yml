route:
  group_by: ["alertname"]
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: "default"

  routes:
    # Route Celery queue empty alerts to webhook for task triggering
    - match:
        alertname: CeleryQueueEmpty
      receiver: "webhook-trigger"
      continue: true

    # Route other alerts to email
    - match_re:
        severity: critical|warning
      receiver: "email"

receivers:
  - name: "default"
    email_configs:
      - to: "your-team@example.com"
        from: "alerts@yourdomain.com"
        smarthost: "smtp.gmail.com:587"
        auth_username: "your-email@gmail.com"
        auth_password: "your-app-password"

  - name: "webhook-trigger"
    webhook_configs:
      - url: "http://localhost:8000/prometheus/webhook"
        send_resolved: false

  - name: "email"
    email_configs:
      - to: "your-team@example.com"
        from: "alerts@yourdomain.com"
        smarthost: "smtp.gmail.com:587"
        auth_username: "your-email@gmail.com"
        auth_password: "your-app-password"

  - name: "slack"
    slack_configs:
      - api_url: "https://hooks.slack.com/services/XXX/YYY/ZZZ"
        channel: "#celery-alerts"
        title: "Celery Alert"
        text: '{{ range .Alerts }}{{ .Annotations.summary }}\n{{ end }}'
